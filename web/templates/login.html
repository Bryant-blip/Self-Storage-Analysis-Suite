<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Tools — Login</title>
    <link rel="icon" type="image/png" href="/static/storcomps-logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #161b27;
            border: 1px solid #21293a;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        .accent-bar {
            width: 60px;
            height: 4px;
            background: #4f8ef7;
            border-radius: 2px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #1e2736;
            color: #64748b;
        }
        .tab-btn.active {
            background: #4f8ef7;
            color: #fff;
        }
        label {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            margin-top: 16px;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #0d1117;
            border: 1px solid #21293a;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #4f8ef7;
        }
        .submit-btn {
            width: 100%;
            padding: 13px;
            margin-top: 28px;
            background: #4f8ef7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #3b7de8;
        }
        .error-msg {
            color: #f43f5e;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="accent-bar"></div>
        <h1>Storage Tools</h1>
        <p class="subtitle">Self Storage Analysis Suite</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Log In</button>
            <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
        </div>

        <form id="authForm" onsubmit="handleSubmit(event)">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="you@example.com">

            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Password" minlength="6">


            <button type="submit" class="submit-btn" id="submitBtn">Log In</button>
            <p class="error-msg" id="errorMsg"></p>
        </form>
    </div>

    <script>
        let mode = 'login';

        function switchTab(tab) {
            mode = tab;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
            });
            document.getElementById('submitBtn').textContent = tab === 'login' ? 'Log In' : 'Create Account';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';

            const body = { email, password };

            try {
                const res = await fetch(`/api/${mode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.detail || 'Something went wrong';
                    errorEl.style.display = 'block';
                    return;
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('email', data.email);
                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
            }
        }

        // If already logged in, redirect
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
