[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
# E: pycodestyle errors, F: pyflakes, I: import sorting
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
# Dashboard and pipeline call load_dotenv() before importing local modules
# that read env vars at import time.
"app.py" = ["E402"]
"comps_pipeline.py" = ["E402"]
# tkinter launcher inserts the project dir into sys.path before local imports.
"crexi_watcher_app.py" = ["E402"]
# One-off maintenance scripts need a sys.path shim before local imports.
"scripts/*.py" = ["E402"]
